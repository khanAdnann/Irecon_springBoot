<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate TTUM</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="./js/common.js"></script>  
     <script src="./js/Networks.js"></script>
    <link rel="stylesheet" href="./css/styles.css">  
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="./js/GenerateTTUM.js"></script>
</head>
<body>
    <!-- Placeholder for Header -->
    <div id="header-container"></div>

    <div class="d-flex">
        <!-- Placeholder for Sidebar -->
        <div id="sidebar-container"></div>
        
        <!-- Main Content -->
        <main class="content d-flex justify-content-center align-items-center">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-md-6">
                    
                        <!-- Dynamic Heading -->
                            <h3 id="heading" class="text-center mb-4 text-dark fw-bold"></h3>
                            
                        <div class="card shadow-lg p-4 mt-5 border-0 rounded-4" style="background: linear-gradient(to right, #ffffff, #f8f9fa);">
                            <form id="processForm">
                                <!-- Sub Category Dropdown (From Reference Form) -->
                                <div class="form-group mb-3 text-center">
                                    <label for="stSubCategory" class="form-label fw-semibold">Sub Category</label>
                                    <select class="form-control rounded-pill shadow-sm mx-auto" name="stSubCategory" id="stSubCategory" onchange="getFields(this)" style="width: 300px;" required>
                                        <option value="-">--SELECT--</option>
                                        <option value="ACQUIRER">ACQUIRER</option>
                                        <option value="ISSUER">ISSUER</option>
                                    </select>
                                </div>

                                <!-- TTUM Type Dropdown (Issuer - From Reference Form) -->
                                <div class="form-group mb-3 text-center" id="issuerOpt" style="display: none;">
                                    <label for="typeOfTTUM" class="form-label fw-semibold">TTUM Type (Issuer)</label>
                                    <select id="typeOfTTUM" name="typeOfTTUM" class="form-control rounded-pill shadow-sm mx-auto" style="width: 300px;">
                                        <option value="0">--SELECT--</option>
                                        <option value="PROACTIVE">PROACTIVE</option>
                                        <option value="PROXY PROACTIVE">PROXY PROACTIVE</option>
                                        <option value="DROP">DROP</option>
                                        <option value="LATE REVERSAL">LATE REVERSAL</option>
                                        <option value="UNDEBITED DROP">UNDEBITED DROP</option>
                                    </select>
                                </div>

                                <!-- TTUM Type Dropdown (Acquirer - From Reference Form) -->
                                <div class="form-group mb-3 text-center" id="acquirerOpt" style="display: none;">
                                    <label for="acqtypeOfTTUM" class="form-label fw-semibold">TTUM Type (Acquirer)</label>
                                    <select id="acqtypeOfTTUM" name="acqtypeOfTTUM" class="form-control rounded-pill shadow-sm mx-auto" style="width: 300px;">
                                        <option value="0">--SELECT--</option>
                                        <option value="LORO CREDIT">LORO CREDIT</option>
                                        <option value="LORO DEBIT">LORO DEBIT</option>
                                    </select>
                                </div>

                                <!-- TTUM Category Dropdown (From Reference Form) -->
                                <div class="form-group mb-3 text-center">
                                    <label for="TTUMCategory" class="form-label fw-semibold">TTUM Category</label>
                                    <select class="form-control rounded-pill shadow-sm mx-auto" name="TTUMCategory" id="TTUMCategory" style="width: 300px;">
                                        <option value="-">--SELECT--</option>
                                        <option value="REPORT">REPORT</option>
                                        <option value="TTUM">TTUM</option>
                                    </select>
                                </div>

                               <!-- Date Input -->
								<div class="mb-3 text-center">
									<label for="dateInput" class="form-label fw-semibold">Transaction
										Date:</label> <input type="text"
										class="form-control rounded-pill shadow-sm text-center"
										id="dateInput" name="fileDate" placeholder="YYYY/MM/DD"
										required>

								</div>


                                <!-- Buttons (From Reference Form) -->
                                <div class="text-center">
                                    <button type="button" class="btn btn-primary fw-bold rounded-pill shadow" onclick="Process();">Process</button>
                                    &nbsp;&nbsp;
                                    <button type="button" class="btn btn-secondary fw-bold rounded-pill shadow" onclick="Download();">Download</button>
                                    &nbsp;&nbsp;
                                    <button type="button" class="btn btn-danger fw-bold rounded-pill shadow" onclick="ReportRollback();">Rollback</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    	<div align="center" id="Loader"
		style="background-color: #ffffff; position: absolute; opacity: 0.9; z-index: 0; height: 100%; width: 100%; left: 0px; top: 0px; display: none">

		<img style="margin-left: 100px; margin-top: 130px;"
			src="./images/loader.gif" alt="loader">
	</div>
    
</body>
</html>
