<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Suspect File Upload</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="./js/common.js"></script>  
    <link rel="stylesheet" href="./css/styles.css">  
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="./js/Suspect_File_Upload.js"></script>
</head>
<body>
    <div id="header-container"></div>

    <div class="d-flex">
        <div id="sidebar-container"></div>

        <!-- Main Content -->
        <main class="content d-flex justify-content-center align-items-center">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <!-- Dynamic Heading -->
                        <h3 id="heading" class="text-center mb-4 text-dark fw-bold">
                            SUSPECT FILE UPLOAD
                        </h3>

                        <div class="card shadow-lg p-4 mt-5 border-0 rounded-4"
                             style="background: linear-gradient(to right, #ffffff, #f8f9fa);">

                            <form id="uploadform" action="SuspectFileUpload.do"
                                  method="POST" enctype="multipart/form-data">

                                <!-- Type -->
                                <div class="mb-3 text-center">
                                    <label for="fileName" class="form-label fw-semibold">Type:</label>
                                    <select class="form-control rounded-pill shadow-sm"
                                            id="fileName"
                                            name="fileName"
                                            onchange="FileNameChange(this)">
                                        <option value="0">--SELECT--</option>
                                        <option value="NTSL-NFS">NFS</option>
                                    </select>
                                </div>

                                <!-- Time Period -->
                                <div class="mb-3 text-center">
                                    <label for="timePeriod" class="form-label fw-semibold">Time Period:</label>
                                    <select class="form-control rounded-pill shadow-sm"
                                            id="timePeriod"
                                            name="timePeriod"
                                            onchange="getCycle(this)">
                                        <option value="0">--SELECT--</option>
                                        <option value="Daily">Daily</option>
                                        <option value="Monthly">Monthly</option>
                                    </select>
                                </div>

                                <!-- Sub Category -->
                                <div class="mb-3 text-center" id="subCate" style="display:none">
                                    <label for="stSubCategory" class="form-label fw-semibold">Sub Category:</label>
                                    <select class="form-control rounded-pill shadow-sm"
                                            name="stSubCategory"
                                            id="stSubCategory">
                                        <option value="-">--SELECT--</option>
                                        <option value="ACQUIRER">ACQUIRER</option>
                                        <option value="ISSUER">ISSUER</option>
                                    </select>
                                </div>

                                <!-- Month Picker -->
                                <div class="mb-3 text-center" id="Month" style="display:none">
                                    <label for="monthpicker" class="form-label fw-semibold">Month:</label>
                                    <input type="text"
                                           class="form-control rounded-pill shadow-sm"
                                           name="fileDate"
                                           readonly="readonly"
                                           id="monthpicker"
                                           placeholder="dd/mm/yyyy"
                                           title="dd/mm/yyyy">
                                </div>

                                <!-- Date Input -->
								<div class="mb-3 text-center">
									<label for="dateInput" class="form-label fw-semibold">Select
										Date:</label> <input type="text"
										class="form-control rounded-pill shadow-sm text-center"
										id="dateInput" name="fileDate" placeholder="YYYY/MM/DD"
										required>

								</div>

                                <!-- File Upload -->
                                <div class="mb-3 text-center">
                                    <label for="dataFile1" class="form-label fw-semibold">File Upload:</label>
                                    <input type="file"
                                           class="form-control rounded-pill shadow-sm"
                                           name="dataFile1"
                                           id="dataFile1"
                                           title="Upload File"
                                           multiple="multiple"/>
                                </div>

                                <!-- Buttons -->
                                <div class="text-center">
                                    <button type="button" class="btn btn-primary fw-bold rounded-pill shadow"
                                            onclick="processNTSLFileUpload();">
                                        Upload
                                    </button>
                                </div>
                            </form>

                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
	<div align="center" id="Loader"
		style="background-color: #ffffff; position: absolute; opacity: 0.9; z-index: 0; height: 100%; width: 100%; left: 0px; top: 0px; display: none">

		<img style="margin-left: 100px; margin-top: 130px;"
			src="./images/loader.gif" alt="loader">
	</div>
    
</body>
</html>
