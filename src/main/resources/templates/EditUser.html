<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="./js/common.js"></script>
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="./css/create_edit_customers.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="./js/EditUser.js"></script>
</head>

<body>
    <div id="header-container"></div>
    
    <div class="d-flex">
        <div id="sidebar-container"></div>
        
         <main class="content d-flex justify-content-center align-items-center w-100">
    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <h2 class="text-dark mb-3">Edit Customers</h2>
                <div class="custom-card mx-auto p-4">
                            <h4 class="text-center text-dark mb-4">Customer Information</h4>
                            <div class="upload-section mb-3">
                                <img src="#" alt="Profile Picture" id="profilePreview">
                                <div>
                                    <input type="file" id="profilePicture" name="profilePicture" class="form-control" accept="image/*">
                                    <small class="text-muted">JPG, GIF, or PNG. 1MB Max.</small>
                                </div>
                            </div>
                            <form id="editForm" enctype="multipart/form-data">
                                <div class="row">
                                    <div class="col-md-6">
                                        <label for="name" class="form-label">Name *</label>
                                        <input type="text" class="form-control" id="name" name="name" placeholder="Enter your Name" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="userid" class="form-label">User ID *</label>
                                        <input type="text" class="form-control" id="userid" name="userid" placeholder="Enter your User ID" required readonly>
                                    </div>
                                </div>
                                <div class="row mt-3">
                                    <div class="col-md-6">
                                        <label for="password" class="form-label">Password</label>
                                        <input type="password" class="form-control" id="password" name="password" placeholder="Enter your Password">
                                    </div>
                                    <div class="col-md-6">
                                        <label for="confirm_password" class="form-label">Confirm Password</label>
                                        <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Confirm Password">
                                    </div>
                                </div>
                                <div class="mt-4 d-flex justify-content-between">
                                    <button type="submit" class="btn btn-success btn-custom">Update</button>
                                    <button type="button" class="btn btn-secondary btn-custom">Cancel</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    	<div align="center" id="Loader"
		style="background-color: #ffffff; position: absolute; opacity: 0.9; z-index: 0; height: 100%; width: 100%; left: 0px; top: 0px; display: none">

		<img style="margin-left: 100px; margin-top: 130px;"
			src="./images/loader.gif" alt="loader">
	</div>
    
</body>
</html>
