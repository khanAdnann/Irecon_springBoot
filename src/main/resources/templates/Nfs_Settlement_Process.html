<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NFS Settlement Process</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="./js/common.js"></script>  
    <script src="./js/Networks.js"></script>
    <link rel="stylesheet" href="./css/styles.css">  
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="./js/Nfs_Settlement_Process.js"></script>
</head>
<body>
    <div id="header-container"></div>

    <div class="d-flex">
        <div id="sidebar-container"></div>

        <!-- Main Content -->
        <main class="content d-flex justify-content-center align-items-center">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <h3  class="text-center mb-4 text-dark fw-bold">
                          NFS SETTLEMENT PROCESS
                        </h3>

                        <div class="card shadow-lg p-4 mt-5 border-0 rounded-4"
                             style="background: linear-gradient(to right, #ffffff, #f8f9fa);">

                            <form id="reportform" action="DownloadRupayAdjTTUM.do"
                                  method="POST" enctype="multipart/form-data">

                                <div class="mb-3 text-center">
                                    <label for="Category" class="form-label fw-semibold">Category:</label>
                                    <select class="form-control rounded-pill shadow-sm"
                                            name="Category"
                                            id="Category">
                                        <option value="-">--SELECT--</option>
                                        <option value="nfs">NFS</option>
                                    </select>
                                </div>


                                <div class="mb-3 text-center">
                                    <label for="cycle" class="form-label fw-semibold">CYCLE:</label>
                                    <select class="form-control rounded-pill shadow-sm"
                                            name="cycle"
                                            id="cycle">
                                        <option value="-">--SELECT--</option>
                                        <option value="1">1</option>
                                        <option value="2">2</option>
                                        <option value="3">3</option>
                                        <option value="4">4</option>
                                    </select>
                                </div>

                                
                                <div class="mb-3 text-center">
                                    <label for="settlementcategory" class="form-label fw-semibold">Settlement Category:</label>
                                    <select class="form-control rounded-pill shadow-sm"
                                            name="settlementcategory"
                                            id="settlementcategory">
                                        <option value="-">--SELECT--</option>
                                        <option value="settlementReport">Settlement Report</option>
                                        <option value="settlementTTUM">Settlement TTUM</option>
                                    </select>
                                </div>

                                <!-- Date Input -->
								<div class="mb-3 text-center">
									<label for="dateInput" class="form-label fw-semibold">Select
										Date:</label> <input type="text"
										class="form-control rounded-pill shadow-sm text-center"
										id="dateInput" name="fileDate" placeholder="YYYY/MM/DD"
										required>

								</div>


                                <!-- Buttons -->
                                <div class="text-center">
                                    <button type="button" class="btn btn-primary fw-bold rounded-pill shadow"
                                            onclick="processAdjTTUM();">
                                        Process
                                    </button>
                                    <button type="button" class="btn btn-success fw-bold rounded-pill shadow"
                                            onclick="DownloadAdjTTUM();">
                                        Download 
                                    </button>
                                    <button type="button" class="btn btn-danger fw-bold rounded-pill shadow"
                                            onclick="ReportRollback();">
                                        RollBack
                                    </button>
                                </div>
                            </form>

                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
	<div align="center" id="Loader"
		style="background-color: #ffffff; position: absolute; opacity: 0.9; z-index: 0; height: 100%; width: 100%; left: 0px; top: 0px; display: none">

		<img style="margin-left: 100px; margin-top: 130px;"
			src="./images/loader.gif" alt="loader">
	</div>
    
</body>
</html>
