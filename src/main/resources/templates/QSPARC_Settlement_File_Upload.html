<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>QSPARC Settlement File Upload</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="./js/common.js"></script>  
    <link rel="stylesheet" href="./css/styles.css">  
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="./js/QSPARC_Settlement_File_Upload.js"></script>
</head>
<body>
    <div id="header-container"></div>

    <div class="d-flex">
        <div id="sidebar-container"></div>

        <!-- Main Content -->
        <main class="content d-flex justify-content-center align-items-center">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <!-- Dynamic Heading -->
                        <h3 id="heading" class="text-center mb-4 text-dark fw-bold">
                        QSPARC SETTLEMENT FILE UPLOAD
                        </h3>

                        <div class="card shadow-lg p-4 mt-5 border-0 rounded-4"
                             style="background: linear-gradient(to right, #ffffff, #f8f9fa);">

                            <form id="uploadform" action="rupayPresentmentUpload.do" method="POST" enctype="multipart/form-data">

                                <!-- SubCategory -->
                                <div class="mb-3 text-center">
                                    <label for="subcategory" class="form-label fw-semibold">SubCategory:</label>
                                    <select class="form-control rounded-pill shadow-sm"
                                            name="subcategory"
                                            id="subcategory">
                                        <option value="0">--SELECT--</option>
                                        <option value="DOMESTIC">DOMESTIC</option>
                                        <option value="INTERNATIONAL">INTERNATIONAL</option>
                                    </select>
                                </div>
                                
                                <!-- Cycle -->
                                <div class="mb-3 text-center">
                                    <label for="files" class="form-label fw-semibold">Files:</label>
                                    <select class="form-control rounded-pill shadow-sm"
                                            name="files"
                                            id="files">
                                        <option value="0">--SELECT--</option>
                                        <option value="1">DSCR REPORT</option>
                                    </select>
                                </div>

                                <!-- Date Input -->
								<div class="mb-3 text-center">
									<label for="dateInput" class="form-label fw-semibold">File
										Date:</label> <input type="text"
										class="form-control rounded-pill shadow-sm text-center"
										id="dateInput" name="fileDate" placeholder="YYYY/MM/DD"
										required>

								</div>

                                <!-- File Upload -->
                                <div class="mb-3 text-center">
                                    <label for="dataFile1" class="form-label fw-semibold">File Upload:</label>
                                    <input type="file" 
                                           class="form-control rounded-pill shadow-sm"
                                           name="file"
                                           id="dataFile1"
                                           title="Upload File" />
                                </div>

                                <!-- Upload Button -->
                                <div class="text-center">
                                    <button type="button"
                                            class="btn btn-primary fw-bold rounded-pill shadow"
                                            onclick="processRupayAdjustUpload();">
                                        UPLOAD
                                    </button>
                                </div>

                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
	<div align="center" id="Loader"
		style="background-color: #ffffff; position: absolute; opacity: 0.9; z-index: 0; height: 100%; width: 100%; left: 0px; top: 0px; display: none">

		<img style="margin-left: 100px; margin-top: 130px;"
			src="./images/loader.gif" alt="loader">
	</div>
    
</body>
</html>
